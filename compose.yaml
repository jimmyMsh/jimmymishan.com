services:
  nginx:
    build:
      context: .
      dockerfile: docker/site.Dockerfile
      target: local
    cgroup_parent: nginx.slice
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    cgroup_parent: api.slice
    environment:
      - LOG_TAIL_ALLOW_PRIVATE=true
    volumes:
      - ./data:/data
      - /sys/fs/cgroup:/host/cgroup:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  goatcounter:
    image: arp242/goatcounter:2.7.0
    # -tls=http: nginx terminates TLS at the edge, so goatcounter serves plain
    # HTTP internally. -db points at a .db file (not the image's default
    # .sqlite3 name) so scripts/backup-sqlite.sh's glob picks it up.
    command:
      - serve
      - -listen=:8080
      - -tls=http
      - -automigrate
      - -db=sqlite+/home/goatcounter/goatcounter-data/goatcounter.db
    cgroup_parent: goatcounter.slice
    volumes:
      - ./data/goatcounter:/home/goatcounter/goatcounter-data
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
