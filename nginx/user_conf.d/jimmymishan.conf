limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=sse_per_ip:1m;

# Rate-limit key that is populated only for POST requests. For every other
# method the key is empty, and nginx does not account requests with an empty
# key, so the write zone below applies to writes alone.
map $request_method $post_ip {
    default "";
    POST    $binary_remote_addr;
}
limit_req_zone $post_ip zone=write_limit:1m rate=1r/m;

# Access-log line shipped to the API's syslog listener. escape=default renders
# control and quote characters in the quoted $uri as \xXX so the line stays
# parseable; the API geolocates $remote_addr and then discards it.
log_format tailfmt escape=default '$time_iso8601 $request_method "$uri" $status $remote_addr';

server {
    listen 80;
    server_name jimmymishan.com stats.jimmymishan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name jimmymishan.com;

    ssl_certificate /etc/letsencrypt/live/jimmymishan/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jimmymishan/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/jimmymishan/chain.pem;

    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    # Keep the stdout access log and additionally mirror it to the API's syslog
    # listener; both are declared here because a server-level access_log would
    # otherwise replace the inherited default.
    access_log /var/log/nginx/access.log;
    access_log syslog:server=api:5140,tag=ngx tailfmt;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_astro/ {
        # expires (not add_header) so the server-level security headers above keep inheriting
        expires 1y;
        try_files $uri =404;
    }

    # SSE stream: unbuffered so frames reach the client as they are produced,
    # capped at 4 concurrent connections per IP (the global cap lives in the
    # API). Must precede the general /api/ prefix location.
    location = /api/events {
        proxy_pass http://api:3000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        limit_conn sse_per_ip 4;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Visitor write endpoints: the general API rate limit plus a per-IP write
    # zone, a tight body cap matching the API's own limit, and 429 on refusal.
    location = /api/guestbook {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req zone=write_limit burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 8k;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/contact {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req zone=write_limit burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 8k;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name stats.jimmymishan.com;

    ssl_certificate /etc/letsencrypt/live/jimmymishan/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jimmymishan/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/jimmymishan/chain.pem;

    location / {
        # Resolve the upstream at request time via Docker's embedded DNS so this
        # vhost boots even before the analytics container joins the network; an
        # absent upstream then surfaces as 502 rather than a config-load failure.
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $goatcounter_upstream goatcounter:8080;
        proxy_pass http://$goatcounter_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
