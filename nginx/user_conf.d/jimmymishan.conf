limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name jimmymishan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name jimmymishan.com;

    ssl_certificate /etc/letsencrypt/live/jimmymishan/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jimmymishan/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/jimmymishan/chain.pem;

    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_astro/ {
        # expires (not add_header) so the server-level security headers above keep inheriting
        expires 1y;
        try_files $uri =404;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
