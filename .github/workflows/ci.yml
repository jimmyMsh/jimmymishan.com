name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (git SHA) to deploy; defaults to this commit"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

  images:
    needs: checks
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/site.Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/jimmymsh/jimmymishan.com/site:latest
            ghcr.io/jimmymsh/jimmymishan.com/site:${{ github.sha }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          build-args: |
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/jimmymsh/jimmymishan.com/api:latest
            ghcr.io/jimmymsh/jimmymishan.com/api:${{ github.sha }}

  deploy:
    needs: images
    if: github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_IP: ${{ secrets.SSH_IP }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName $SSH_IP
            User $SSH_USER
            IdentityFile ~/.ssh/deploy-key
            StrictHostKeyChecking accept-new
          EOF
      - name: Sync compose and scripts
        run: |
          ssh vps 'mkdir -p ~/jimmymishan.com/scripts'
          scp compose.prod.yaml vps:~/jimmymishan.com/
          scp scripts/*.sh vps:~/jimmymishan.com/scripts/
          ssh vps 'chmod +x ~/jimmymishan.com/scripts/*.sh'
      - name: Deploy
        run: |
          TAG="${{ inputs.tag || github.sha }}"
          ssh vps "cd ~/jimmymishan.com && TAG=$TAG docker compose -f compose.prod.yaml pull && TAG=$TAG docker compose -f compose.prod.yaml up -d --remove-orphans && docker image prune -f"
      - name: Health check
        run: |
          sleep 10
          curl -fsS https://jimmymishan.com/api/healthz
      # Records the deploy in the API's feed. Signs {sha, tag, status, actor, ts}
      # (ts in unix seconds) with an HMAC-SHA256 over the exact request body and
      # sends it as X-Deploy-Signature: sha256=<hex>, matching the verification
      # in the /api/deploys/webhook route. Requires the DEPLOY_WEBHOOK_SECRET
      # repository secret (the same HMAC key the API is configured with).
      - name: Record deploy
        if: success()
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          SHA: ${{ github.sha }}
          TAG: ${{ inputs.tag || github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          TS=$(date +%s)
          BODY=$(printf '{"sha":"%s","tag":"%s","status":"ok","actor":"%s","ts":%s}' "$SHA" "$TAG" "$ACTOR" "$TS")
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$DEPLOY_WEBHOOK_SECRET" | awk '{print $NF}')
          curl -sS -X POST https://jimmymishan.com/api/deploys/webhook \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Signature: sha256=$SIG" \
            --data "$BODY" || true
      - name: Notify success
        if: success()
        run: 'curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" -d "content=🚀 Deployed ${{ inputs.tag || github.sha }}"'
      - name: Notify failure
        if: failure()
        run: 'curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" -d "content=🚨 Deploy failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'
      # Best-effort: record the failure in the API's feed on any failed step.
      # Uses the same DEPLOY_WEBHOOK_SECRET-signed scheme; never fails the job.
      - name: Record failed deploy
        if: failure()
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          SHA: ${{ github.sha }}
          TAG: ${{ inputs.tag || github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          TS=$(date +%s)
          BODY=$(printf '{"sha":"%s","tag":"%s","status":"failed","actor":"%s","ts":%s}' "$SHA" "$TAG" "$ACTOR" "$TS")
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$DEPLOY_WEBHOOK_SECRET" | awk '{print $NF}')
          curl -sS -X POST https://jimmymishan.com/api/deploys/webhook \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Signature: sha256=$SIG" \
            --data "$BODY" || true
